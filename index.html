  <style>
    /* CRITICAL: Prevent white flash on refresh - dark background ALWAYS */
    html, body {
      background: hsl(215 100% 12%) !important;
    }
    
    /* Dedicated full-screen background layer to eliminate iOS PWA banding/stripes */
    #app-bg { display: none !important; }
    /* Ensure app content sits above background layer */
    #root { position: relative; z-index: 1; }

    /* Global CSS var to offset decorations in PWA */
    :root { --pwa-top-offset: 0px; }

    /* In standalone (Add to Home Screen) keep a solid base color under the gradient */
    @media (display-mode: standalone) {
      html, body { 
        min-height: calc(100dvh + env(safe-area-inset-bottom, 0px));
        padding-top: max(env(safe-area-inset-top, 0px), 88px);
      }
      :root { --pwa-top-offset: max(env(safe-area-inset-top, 0px), 88px); }
    }
    /* iOS hint: keep Tailwind bounce but reduce initial blur */
    .animate-bounce { -webkit-backface-visibility: hidden; backface-visibility: hidden; }

    /* Portrait-only overlay - show message in landscape mode */
    #portrait-warning {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: hsl(215 100% 12%);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    /* Only show on touch devices (phones/tablets), not desktop with mouse */
    @media (orientation: landscape) and (max-height: 600px) and (pointer: coarse) {
      #portrait-warning {
        display: flex;
      }
      #root {
        visibility: hidden;
      }
    }
    /* ===== AUTH SPLASH SCREEN (hard refresh only on /auth) ===== */
    #auth-splash {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      /* Desktop: py-8 (32px) + center av 260px container */
      padding-top: 50px;
      background: hsl(215, 100%, 12%);
      /* Start fully visible to block content immediately */
      opacity: 1;
      transition: opacity 0.4s ease-out;
      transform: translateZ(0);
      will-change: opacity;
    }
    /* Content elements fade in separately */
    #auth-splash-logo,
    #auth-splash-tagline,
    #auth-splash-dots {
      opacity: 0;
      transition: opacity 0.4s ease-out;
    }
    /* When splash is ready, fade in content */
    #auth-splash.content-ready #auth-splash-logo,
    #auth-splash.content-ready #auth-splash-tagline,
    #auth-splash.content-ready #auth-splash-dots {
      opacity: 1;
    }
    /* Mobile: safe-area + pt-6 (24px) */
    @media (max-width: 640px) {
      #auth-splash { padding-top: calc(env(safe-area-inset-top, 0px) + 24px); }
    }
    #auth-splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    #auth-splash-logo {
      /* Matchar AuthSplashScreen EXAKT: desktop h-56 (224px) */
      height: 224px;
      width: auto;
      margin-bottom: 0;
      transform: translateZ(0);
    }
    /* lg breakpoint: h-64 (256px) */
    @media (min-width: 1024px) {
      #auth-splash-logo { height: 256px; }
    }
    /* Mobile: h-40 * scale-125 = 200px */
    @media (max-width: 640px) {
      #auth-splash-logo { height: 200px; }
    }
    #auth-splash-tagline {
      color: white;
      /* Desktop: text-xl (1.25rem), lg: text-2xl (1.5rem) */
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-top: 8px;
      margin-bottom: 40px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    @media (min-width: 1024px) {
      #auth-splash-tagline { font-size: 1.5rem; }
    }
    /* Mobile: text-2xl */
    @media (max-width: 640px) {
      #auth-splash-tagline { font-size: 1.5rem; margin-top: 4px; }
    }
    #auth-splash-dots {
      display: flex;
      align-items: center;
      gap: 10px;
      transition: opacity 0.4s ease-out;
    }
    #auth-splash-dots.fading {
      opacity: 0;
    }
    #auth-splash-fallback {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: min(320px, calc(100vw - 48px));
      margin-top: 24px;
      text-align: center;
      color: hsl(0 0% 100%);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    #auth-splash-fallback p {
      margin: 0;
      font-size: 0.95rem;
      line-height: 1.45;
      color: hsla(0 0% 100% / 0.82);
    }
    #auth-splash-retry {
      appearance: none;
      border: 1px solid hsla(0 0% 100% / 0.24);
      background: hsla(0 0% 100% / 0.08);
      color: hsl(0 0% 100%);
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    #auth-splash.recovery #auth-splash-fallback {
      display: flex;
    }
    #auth-splash-dots span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
      transform: translateZ(0);
      will-change: opacity, transform;
      animation: authSplashDotPulse 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    #auth-splash-dots span:nth-child(1) { animation-delay: -1.7s; }
    #auth-splash-dots span:nth-child(2) { animation-delay: -1.3s; }
    #auth-splash-dots span:nth-child(3) { animation-delay: -0.9s; }
    @keyframes authSplashDotPulse {
      0%, 100% { 
        opacity: 0.4; 
        transform: translateZ(0) scale(1); 
      }
      50% { 
        opacity: 1; 
        transform: translateZ(0) scale(1.15); 
      }
    }
  </style>
</head>

  <body>
    <!-- AUTH SPLASH SCREEN - Only shown on /auth hard refresh -->
    <div id="auth-splash" aria-label="Laddar Parium">
      <!-- PNG preloadad (se <link preload> i head) för instant visning -->
      <img 
        id="auth-splash-logo" 
        src="/parium-auth-logo.png" 
        alt="Parium"
        decoding="sync"
        fetchpriority="high"
      />
      <p id="auth-splash-tagline">Din karriärresa börjar här</p>
      <div id="auth-splash-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div id="auth-splash-fallback" aria-live="polite">
        <p>Inloggningen tar längre tid än väntat. Vi håller kvar laddningsskärmen tills appen är redo.</p>
        <button id="auth-splash-retry" type="button">Försök igen</button>
      </div>
    </div>
    <script>
      // Show auth splash ONLY on /auth route during hard refresh (NOT SPA navigation)
      (function() {
        try {
          var path = window.location.pathname;
          // Skip splash if coming from landing page (SPA navigation)
          var skipSplash = false;
          try {
            skipSplash = sessionStorage.getItem('parium-skip-splash') === '1';
          } catch(e) {}
          
          if ((path === '/auth' || path === '/auth/') && !skipSplash) {
            var splash = document.getElementById('auth-splash');
            var logo = document.getElementById('auth-splash-logo');
            var dots = document.getElementById('auth-splash-dots');
            var retryButton = document.getElementById('auth-splash-retry');
            var retriedKey = 'parium-auth-hard-refresh-retried';
            if (splash && logo) {
              // Display container IMMEDIATELY with dark background to block auth content
              splash.style.display = 'flex';
              
              // Function to fade in content (not the container)
              var contentShown = false;
              var exitStarted = false;
              var recoveryShown = false;
              function showContent() {
                if (contentShown) return;
                contentShown = true;
                requestAnimationFrame(function() {
                  splash.classList.add('content-ready');
                });
              }

              function clearRetryFlag() {
                try {
                  sessionStorage.removeItem(retriedKey);
                } catch (e) {}
              }

              function startExit() {
                if (exitStarted || recoveryShown) return;
                exitStarted = true;
                if (dots) dots.classList.add('fading');
                setTimeout(function() {
                  splash.classList.add('fade-out');
                  setTimeout(function() {
                    splash.style.display = 'none';
                    clearRetryFlag();
                  }, 500);
                }, 400);
              }

              function showRecovery() {
                if (recoveryShown || window.__pariumAppMounted === true) return;
                recoveryShown = true;
                splash.classList.remove('fade-out');
                splash.classList.add('content-ready', 'recovery');
                if (dots) dots.classList.add('fading');
              }

              function tryExitIfMounted() {
                if (window.__pariumAppMounted === true) {
                  startExit();
                }
              }

              if (retryButton) {
                retryButton.addEventListener('click', function() {
                  clearRetryFlag();
                  window.location.reload();
                });
              }

              if (window.__pariumAppMounted === true) {
                startExit();
              } else {
                window.addEventListener('parium:app-mounted', startExit, { once: true });
              }
              
              // Wait for logo to load, then fade in content
              if (logo.complete && logo.naturalHeight !== 0) {
                // Already loaded (cached)
                showContent();
              } else {
                logo.onload = showContent;
                // Fallback if image fails
                logo.onerror = showContent;
                // SAFETY: if the image load event stalls on mobile/network edge cases,
                // never leave users on a blank blue screen.
                setTimeout(showContent, 800);
              }

              // Keep polling briefly in case the app mounts before the event listener is attached.
              setTimeout(tryExitIfMounted, 1200);
              setTimeout(tryExitIfMounted, 2200);

              // If the app still hasn't mounted, do one guarded hard refresh.
              // If that still doesn't recover, keep the splash visible and show retry UI
              // instead of ever dropping to a blank blue screen.
              setTimeout(function() {
                if (window.__pariumAppMounted === true) {
                  startExit();
                  return;
                }

                var alreadyRetried = false;
                try {
                  alreadyRetried = sessionStorage.getItem(retriedKey) === '1';
                } catch (e) {}

                if (!alreadyRetried) {
                  try {
                    sessionStorage.setItem(retriedKey, '1');
                  } catch (e) {}
                  window.location.reload();
                  return;
                }

                showRecovery();
              }, 3200);
            }
          }
        } catch(e) {}
      })();
    </script>

    <!-- Portrait-only warning -->
    <div id="portrait-warning" role="alert" aria-live="polite">
      <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 2rem; opacity: 0.9;">

        <line x1="12" y1="18" x2="12.01" y2="18"/>
      </svg>
      <h1 style="color: white; font-size: 1.5rem; font-weight: 600; margin-bottom: 1rem; font-family: Inter, sans-serif;">
        Rotera din enhet
      </h1>
      <p style="color: rgb(255,255,255); font-size: 1rem; font-family: Inter, sans-serif; max-width: 320px;">
        Parium fungerar bäst i porträttläge. Vrid tillbaka din telefon för att fortsätta
      </p>
    </div>
    
    <div id="app-bg" aria-hidden="true"></div>
    <!-- Hidden hero preloader for Safari/iOS -->
    <img src="/assets/hero-woman-left-hand-verified.jpg" alt="" aria-hidden="true" decoding="sync" fetchpriority="high" style="position:absolute;width:0;height:0;overflow:hidden;opacity:0;pointer-events:none;" />
    <div id="root"></div>
    <script>
      try {
        const hostname = window.location.hostname;
        const isPreviewHost = hostname.includes('id-preview--') || hostname.includes('lovableproject.com');

        // Preview använder egen cache/versionshantering. Undvik extra URL-versionering här
        // eftersom den kan skapa 412-fel i modul-laddning i preview.
        if (!isPreviewHost) {
          const meta = document.querySelector('meta[name="build-version"]');
          const v = meta?.getAttribute('content') || '';
          const key = 'parium_build_version';
          const prev = localStorage.getItem(key);
          if (!prev) {
            localStorage.setItem(key, v);
          } else if (prev !== v) {
            localStorage.setItem(key, v);
            // Behåll bild-/profil-cache intakt.
            // Gör endast en kontrollerad URL-versionering för att hämta ny app-shell.
            const url = new URL(window.location.href);
            url.searchParams.set('v', v.replace(/\D/g, '').slice(0, 12));
            if (window.location.href !== url.toString()) {
              window.location.replace(url.toString());
            } else {
              window.location.reload();
            }
          }
        }
      } catch (e) { /* noop */ }
    </script>
    <script>
      (function() {
        try {
          var isStandalone = window.matchMedia && window.matchMedia('(display-mode: standalone)').matches;
          // iOS specific fallback
          // @ts-ignore
          if (!isStandalone && typeof navigator !== 'undefined' && navigator.standalone) {
            isStandalone = true;
          }
          if (isStandalone) {
            var base = 88; // default offset for status area in standalone
            document.documentElement.style.setProperty('--pwa-top-offset', base + 'px');
            document.body.style.setProperty('--pwa-top-offset', base + 'px');
          }
        } catch (e) { /* noop */ }
      })();
    </script>
    <!-- Service Worker endast i produktion för att undvika störande reloads i utveckling -->
    <script>
      // SW disabled in preview - handled by main.tsx in production only
      // This prevents SW from interfering with HMR and causing slow reloads on touch devices
    </script>
    <script>
      (function () {
        try {
          var hostname = window.location.hostname;
          var isPreviewHost = hostname.includes('id-preview--') || hostname.includes('lovableproject.com');
          if (!isPreviewHost) return;

          var resetKey = 'parium_preview_bootstrap_reset_v1';
          var alreadyReset = false;
          try {
            alreadyReset = sessionStorage.getItem(resetKey) === '1';
          } catch (e) {
            alreadyReset = false;
          }

          if (alreadyReset) return;

          // Stoppa modul-import på första laddningen tills preview-cacher är rensade.
          window.__pariumPreviewResetInProgress = true;

          try {
            sessionStorage.setItem(resetKey, '1');
          } catch (e) {}

          Promise.allSettled([
            (navigator.serviceWorker && navigator.serviceWorker.getRegistrations)
              ? navigator.serviceWorker.getRegistrations().then(function (regs) {
                  return Promise.allSettled(regs.map(function (r) { return r.unregister(); }));
                })
              : Promise.resolve(),
            (window.caches && caches.keys)
              ? caches.keys().then(function (keys) {
                  return Promise.allSettled(keys.map(function (k) { return caches.delete(k); }));
                })
              : Promise.resolve(),
          ]).finally(function () {
            window.location.reload();
          });
        } catch (e) {
          // noop
        }
      })();
    </script>
    <script type="module">
      if (!window.__pariumPreviewResetInProgress) {
        const retryKey = 'parium_bootstrap_retry_once';

        import('/src/main.tsx')
          .then(() => {
            try {
              sessionStorage.removeItem(retryKey);
            } catch (e) {
              // noop
            }
          })
          .catch(() => {
            try {
              const alreadyRetried = sessionStorage.getItem(retryKey) === '1';
              if (!alreadyRetried) {
                sessionStorage.setItem(retryKey, '1');
                const url = new URL(window.location.href);
                url.searchParams.set('__boot', String(Date.now()));
                window.location.replace(url.toString());
              }
            } catch (e) {
              window.location.reload();
            }
          });
      }
    </script>
