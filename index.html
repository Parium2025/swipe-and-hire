    <script>
      // Theme-color måste skrivas medan <head> parsas, innan Safari låser browser-chrome.
      (function() {
        try {
          var isLandingVideoRoute = window.location.pathname === '/' || window.location.pathname === '';
          var chromeColor = isLandingVideoRoute ? '#8A8A8A' : '#001935';
          document.documentElement.classList.toggle('landing-video-chrome', isLandingVideoRoute);
          document.documentElement.classList.toggle('parium-app-chrome', !isLandingVideoRoute);
          document.write('<meta name="theme-color" content="' + chromeColor + '" media="(prefers-color-scheme: light)">');
          document.write('<meta name="theme-color" content="' + chromeColor + '" media="(prefers-color-scheme: dark)">');
        } catch (e) {
          document.write('<meta name="theme-color" content="#001935">');
        }
      })();
    </script>
    <title>Parium – Rekrytering. På 60 sekunder.</title>

    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <script>
      // First-paint browser chrome/background: sand only on the video landing route.
      // All other routes keep the Parium blue before React has mounted.
      (function() {
        try {
          var isLandingVideoRoute = window.location.pathname === '/' || window.location.pathname === '';
          var chromeColor = isLandingVideoRoute ? '#8A8A8A' : '#001935';
          document.documentElement.classList.toggle('landing-video-chrome', isLandingVideoRoute);
          document.documentElement.classList.toggle('parium-app-chrome', !isLandingVideoRoute);
          var metas = document.querySelectorAll('meta[name="theme-color"]');
          for (var i = 0; i < metas.length; i++) metas[i].setAttribute('content', chromeColor);
          document.addEventListener('DOMContentLoaded', function() {
            document.body.classList.toggle('landing-video-chrome', isLandingVideoRoute);
            document.body.classList.toggle('parium-app-chrome', !isLandingVideoRoute);
          }, { once: true });
        } catch (e) { /* noop */ }
      })();

      // 🚨 PUBLIC DOMAIN HARD-LOAD / CACHE KILL-SWITCH
      // Runs before React on every public route. It does NOT trust old
      // localStorage/sessionStorage markers: if any Service Worker/controller or
      // Cache Storage bucket exists, it unregisters/deletes everything and
      // reloads once with a unique cache-bust URL.
      (function() {
        try {
          var host = window.location.hostname;
          var isPublicHost = host === 'parium.se' || host === 'www.parium.se' || host === 'parium-ab.lovable.app';
          if (!isPublicHost) return;

          var resetVersion = 'domain-hard-load-2026-04-26-v9-no-sw-no-cache';
          var resetParam = '_hard_reload';
          var attemptKey = 'parium_domain_hard_reload_attempt_' + resetVersion;
          var maxAttempts = 3;
          var url = new URL(window.location.href);
          var attempts = 0;
          try { attempts = parseInt(sessionStorage.getItem(attemptKey) || '0', 10) || 0; } catch (e) {}

          var cleanupTasks = [];
          var hadBlockingCache = false;

          try {
            if (window.caches && caches.keys) {
              cleanupTasks.push(caches.keys().then(function(keys) {
                if (keys && keys.length) hadBlockingCache = true;
                return Promise.all(keys.map(function(k) { return caches.delete(k); }));
              }).catch(function() {}));
            }
          } catch (e) {}

          try {
            if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
              if (navigator.serviceWorker.controller) hadBlockingCache = true;
              cleanupTasks.push(navigator.serviceWorker.getRegistrations().then(function(regs) {
                if (regs && regs.length) hadBlockingCache = true;
                return Promise.all(regs.map(function(r) { try { return r.unregister(); } catch (e) { return false; } }));
              }).catch(function() {}));
            }
          } catch (e) {}

          if (!cleanupTasks.length) return;

          Promise.all(cleanupTasks).finally(function() {
            try {
              if (hadBlockingCache && attempts < maxAttempts) {
                sessionStorage.setItem(attemptKey, String(attempts + 1));
                var next = new URL(window.location.href);
                next.searchParams.set(resetParam, resetVersion + '-' + Date.now());
                window.location.replace(next.toString());
                return;
              }

              if (url.searchParams.has(resetParam)) {
                url.searchParams.delete(resetParam);
                window.history.replaceState({}, document.title, url.toString());
              }
            } catch (e) {
              try { window.location.reload(); } catch (e2) {}
            }
          });
        } catch (e) { /* noop */ }
      })();

      // 🚨 FIRST-PAINT VERSION CHECK
      // Körs FÖRE allt annat. Om Safari har cachat en gammal index.html men servern
      // har en ny version → reload omedelbart med cache-bust. Detta är den enda
      // mekanismen som fungerar mot iOS Safaris aggressiva disk-cache.
      (function() {
        try {
          var meta = document.querySelector('meta[name="parium-build"]');
          if (!meta) return; // dev — ingen build-version
          var clientVersion = meta.getAttribute('content');
          if (!clientVersion) return;

          // Skydd mot loop — max 1 reload per 30s
          var loopKey = 'parium_version_check_loop';
          var lastReload = sessionStorage.getItem(loopKey);
          if (lastReload && (Date.now() - parseInt(lastReload, 10)) < 30000) return;

          fetch('/version.json', { cache: 'no-store', credentials: 'omit' })
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(data) {
              if (!data || !data.version) return;
              if (data.version === clientVersion) return; // matchar — allt bra

              // Mismatch → Safari serverar gammal index.html. Töm SW/Cache först,
              // vänta tills det är klart och navigera sedan. Annars kan iOS Safari
              // hinna låta den gamla service workern svara på reloaden igen.
              sessionStorage.setItem(loopKey, String(Date.now()));
              var cleanupTasks = [];
              try {
                if (window.caches && caches.keys) {
                  cleanupTasks.push(caches.keys().then(function(keys) {
                    return Promise.all(keys.map(function(k) { return caches.delete(k); }));
                  }).catch(function() {}));
                }
              } catch (e) {}
              try {
                if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
                  cleanupTasks.push(navigator.serviceWorker.getRegistrations().then(function(rs) {
                    return Promise.all(rs.map(function(r) { try { return r.unregister(); } catch (e) { return false; } }));
                  }).catch(function() {}));
                }
              } catch (e) {}
              Promise.all(cleanupTasks).finally(function() { try {
                var url = new URL(window.location.href);
                url.searchParams.set('_v', data.version.slice(0, 10));
                window.location.replace(url.toString());
              } catch (e) {
                try { window.location.reload(); } catch (e2) {}
              }});
            })
            .catch(function() { /* offline — strunta */ });
        } catch (e) { /* noop */ }
      })();
    </script>

  <style>
    /* CRITICAL: Prevent white flash on refresh - dark background by default */
    html, body {
      background: hsl(215 100% 12%) !important;
    }
    html.landing-video-chrome,
    html.landing-video-chrome body,
    html.landing-video-chrome #root {
      background: hsl(26 8% 49%) !important;
      background-color: hsl(26 8% 49%) !important;
    }
    
    /* Dedicated full-screen background layer to eliminate iOS PWA banding/stripes */
    #app-bg { display: none !important; }
    /* Ensure app content sits above background layer */
    #root { position: relative; z-index: 1; }

    /* Global CSS var to offset decorations in PWA */
    :root { --pwa-top-offset: 0px; }

    /* In standalone (Add to Home Screen) keep a solid base color under the gradient */
    @media (display-mode: standalone) {
      html, body { 
        min-height: calc(100dvh + env(safe-area-inset-bottom, 0px));
        padding-top: max(env(safe-area-inset-top, 0px), 88px);
      }
      :root { --pwa-top-offset: max(env(safe-area-inset-top, 0px), 88px); }
    }
    /* iOS hint: keep Tailwind bounce but reduce initial blur */
    .animate-bounce { -webkit-backface-visibility: hidden; backface-visibility: hidden; }

    /* Portrait-only overlay - show message in landscape mode */
    #portrait-warning {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: hsl(215 100% 12%);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    /* Only show on touch devices (phones/tablets), not desktop with mouse */
    @media (orientation: landscape) and (max-height: 600px) and (pointer: coarse) {
      #portrait-warning {
        display: flex;
      }
      #root {
        visibility: hidden;
      }
    }
    /* ===== AUTH SPLASH SCREEN (hard refresh only on /auth) ===== */
    #auth-splash {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      /* Desktop: py-8 (32px) + center av 260px container */
      padding-top: 50px;
      background: hsl(215, 100%, 12%);
      /* Start fully visible to block content immediately */
      opacity: 1;
      transition: opacity 0.4s ease-out;
      transform: translateZ(0);
      will-change: opacity;
    }
    /* Content elements fade in separately */
    #auth-splash-logo,
    #auth-splash-tagline,
    #auth-splash-dots {
      opacity: 0;
      transition: opacity 0.4s ease-out;
    }
    /* When splash is ready, fade in content */
    #auth-splash.content-ready #auth-splash-logo,
    #auth-splash.content-ready #auth-splash-tagline,
    #auth-splash.content-ready #auth-splash-dots {
      opacity: 1;
    }
    /* Mobile: safe-area + pt-6 (24px) */
    @media (max-width: 640px) {
      #auth-splash { padding-top: calc(env(safe-area-inset-top, 0px) + 24px); }
    }
    #auth-splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    #auth-splash-logo {
      /* Matchar AuthSplashScreen EXAKT: desktop h-56 (224px) */
      height: 224px;
      width: auto;
      margin-bottom: 0;
      transform: translateZ(0);
    }
    /* lg breakpoint: h-64 (256px) */
    @media (min-width: 1024px) {
      #auth-splash-logo { height: 256px; }
    }
    /* Mobile: h-40 * scale-125 = 200px */
    @media (max-width: 640px) {
      #auth-splash-logo { height: 200px; }
    }
    #auth-splash-tagline {
      color: white;
      /* Desktop: text-xl (1.25rem), lg: text-2xl (1.5rem) */
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-top: 8px;
      margin-bottom: 40px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    @media (min-width: 1024px) {
      #auth-splash-tagline { font-size: 1.5rem; }
    }
    /* Mobile: text-2xl */
    @media (max-width: 640px) {
      #auth-splash-tagline { font-size: 1.5rem; margin-top: 4px; }
    }
    #auth-splash-dots {
      display: flex;
      align-items: center;
      gap: 10px;
      transition: opacity 0.4s ease-out;
    }
    #auth-splash-dots.fading {
      opacity: 0;
    }
    #auth-splash-dots span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
      transform: translateZ(0);
      will-change: opacity, transform;
      animation: authSplashDotPulse 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    #auth-splash-dots span:nth-child(1) { animation-delay: -1.7s; }
    #auth-splash-dots span:nth-child(2) { animation-delay: -1.3s; }
    #auth-splash-dots span:nth-child(3) { animation-delay: -0.9s; }
    @keyframes authSplashDotPulse {
      0%, 100% { 
        opacity: 0.4; 
        transform: translateZ(0) scale(1); 
      }
      50% { 
        opacity: 1; 
        transform: translateZ(0) scale(1.15); 
      }
    }
  </style>

  <body>
    <!-- AUTH SPLASH SCREEN - Only shown on /auth hard refresh -->
    <div id="auth-splash" aria-label="Laddar Parium">
      <!-- PNG preloadad (se <link preload> i head) för instant visning -->
      <img 
        id="auth-splash-logo" 
        src="/parium-auth-logo.png" 
        alt="Parium"
        decoding="sync"
        fetchpriority="high"
      />
      <p id="auth-splash-tagline">Din karriärresa börjar här</p>
      <div id="auth-splash-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
    <script>
      // Show auth splash ONLY on /auth route during hard refresh (NOT SPA navigation)
      (function() {
        try {
          var path = window.location.pathname;
          // Skip splash if coming from landing page (SPA navigation)
          var skipSplash = false;
          try {
            skipSplash = sessionStorage.getItem('parium-skip-splash') === '1';
          } catch(e) {}
          
          if ((path === '/auth' || path === '/auth/') && !skipSplash) {
            var splash = document.getElementById('auth-splash');
            var logo = document.getElementById('auth-splash-logo');
            if (splash && logo) {
              // Display container IMMEDIATELY with dark background to block auth content
              splash.style.display = 'flex';
              
              // Function to fade in content (not the container)
              function showContent() {
                requestAnimationFrame(function() {
                  splash.classList.add('content-ready');
                });
              }
              
              // Wait for logo to load, then fade in content
              if (logo.complete && logo.naturalHeight !== 0) {
                // Already loaded (cached)
                showContent();
              } else {
                logo.onload = showContent;
                // Fallback if image fails
                logo.onerror = showContent;
              }
              
              // Fade dots first (0.5s before splash fades)
              setTimeout(function() {
                var dots = document.getElementById('auth-splash-dots');
                if (dots) dots.classList.add('fading');
              }, 1500);
              
              // Fade out entire splash after 2 seconds
              setTimeout(function() {
                splash.classList.add('fade-out');
                // Remove from DOM after fade
                setTimeout(function() {
                  splash.style.display = 'none';
                }, 500);
              }, 2000);
            }
          }
        } catch(e) {}
      })();
    </script>

    <div id="root"></div>
    <script>
      (function() {
        try {
          var isStandalone = window.matchMedia && window.matchMedia('(display-mode: standalone)').matches;
          // iOS specific fallback
          // @ts-ignore
          if (!isStandalone && typeof navigator !== 'undefined' && navigator.standalone) {
            isStandalone = true;
          }
          if (isStandalone) {
            var base = 88; // default offset for status area in standalone
            document.documentElement.style.setProperty('--pwa-top-offset', base + 'px');
            document.body.style.setProperty('--pwa-top-offset', base + 'px');
          }
        } catch (e) { /* noop */ }
      })();
    </script>

      // SW disabled in preview - handled by main.tsx in production only
